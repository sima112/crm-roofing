<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#0d9488" />
  <title>You're Offline — CrewBooks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      color: #0f172a;
      padding: 1.5rem;
    }
    .card {
      background: white;
      border-radius: 1.25rem;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 72px; height: 72px;
      background: #f0fdf4;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon svg { width: 36px; height: 36px; color: #0d9488; }
    h1 { font-size: 1.375rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.9375rem; color: #64748b; line-height: 1.6; margin-bottom: 1.5rem; }
    .badge {
      display: inline-block;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      padding: 0.75rem 1.25rem;
      font-size: 0.875rem;
      color: #475569;
      line-height: 1.5;
    }
    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.75rem;
      background: #0d9488;
      color: white;
      border: none;
      border-radius: 0.625rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
    .brand {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #94a3b8;
    }
    .brand span { color: #0d9488; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>No internet connection right now. Your data will sync automatically when you're back online.</p>
    <div class="badge">
      Data is safe locally.<br />
      Reconnect to sync changes.
    </div>
    <button onclick="window.location.reload()">Try Again</button>
    <p class="brand">Powered by <span>CrewBooks</span></p>
  </div>
</body>
</html>
